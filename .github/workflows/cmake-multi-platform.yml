name: CMake on multiple platforms with SQLite and FLTK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]   # 可加 mac
        build_type: [Release]                               # 也可加 Debug

    steps:
      - uses: actions/checkout@v4

      # 1. 安装依赖（vcpkg 自动处理所有平台）
      - name: Setup vcpkg and install dependencies
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      # 2. 配置 CMake（使用 vcpkg 工具链，编译器自动检测）
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -S ${{ github.workspace }}

      # 3. 编译
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      # 4. 测试（如果有）
      - name: Test
        working-directory: build
        run: ctest --build-config ${{ matrix.build_type }}
