name: CMake Multi-Platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v4

      # Linux 系统依赖
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxft-dev libxext-dev libxinerama-dev \
            libxcursor-dev libxrender-dev libxfixes-dev \
            libglu1-mesa-dev libfontconfig1-dev libpango1.0-dev libcairo2-dev

      # vcpkg 安装依赖
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      # 配置 CMake
      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -S "$GITHUB_WORKSPACE"

      # 构建
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}
        
      # artifact 上传
      - name: Upload artifact (executable + required dynamic libs)
        uses: actions/upload-artifact@v4
        with:
          name: carTrainerSystem-${{ matrix.os }}-${{ matrix.build_type }}
          path: |
            build/src/carTrainerSystem*
            build/src/Release/carTrainerSystem.exe
            ${{ matrix.os == 'windows-latest' && 'build/vcpkg_installed/x64-windows/bin/*.dll' || '' }}
            ${{ matrix.os == 'ubuntu-latest' && 'build/vcpkg_installed/x64-linux/lib/*.so*' || '' }}
            ${{ matrix.os == 'macos-latest' && 'build/vcpkg_installed/x64-osx/lib/*.dylib' || '' }}

      - name: Test
        working-directory: build
        run: ctest --build-config ${{ matrix.build_type }}
      # 测试
      - name: Test
        working-directory: build
        run: ctest --build-config ${{ matrix.build_type }}
